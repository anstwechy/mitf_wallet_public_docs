# MITF Wallet public docs — MkDocs Material (teal / emerald theme, distinct from AML docs).
# Local: pip install -r requirements.txt && mkdocs serve
# Site:  https://anstwechy.github.io/mitf_wallet_public_docs/
site_name: MITF Wallet documentation
site_description: MITF wallet platform — technical documentation for integrators and operators
site_author: Masarat
site_url: https://anstwechy.github.io/mitf_wallet_public_docs/
repo_url: https://github.com/anstwechy/mitf_wallet_public_docs
repo_name: GitHub
edit_uri: edit/main/docs/
copyright: >
  Masarat &middot; <a href="https://masarat.ly/">masarat.ly</a>

docs_dir: docs
site_dir: site

validation:
  nav:
    omitted_files: info
  links:
    not_found: info
    absolute_links: relative_to_docs
    unrecognized_links: info

exclude_docs: |
  /site/**

# Nav order: leadership first, then onboarding, deep architecture, assurance layers,
# integrations, evidence (load tests), encyclopedic reference last.
nav:
  - "Home (technical hub)": README.md
  - "For Masarat leadership":
      - "Platform at a glance": stakeholders/index.md
      - "Executive & business overview": stakeholders/executive-overview.md
      - "Risk, compliance & finance": stakeholders/risk-compliance-and-finance.md
      - "Operations & technology": stakeholders/operations-and-technology.md
  - Getting started:
      - "5-minute quickstart": getting-started/quickstart.md
      - "Local development setup": getting-started/local-development.md
      - Welcome & guided tours: getting-started/welcome.md
      - Full A–Z index: getting-started/all-pages.md
  - "Changelog & releases": changelog.md
  - Glossary: glossary.md
  - Architecture:
      - Platform capabilities: architecture/platform-capabilities.md
      - "Architecture Decision Records":
          - Index: architecture/decisions/README.md
          - ADR template: architecture/decisions/0000-template.md
          - "ADR 0001: Outbox & messaging": architecture/decisions/0001-outbox-and-transactional-messaging.md
      - Domain events: architecture/events.md
      - Money movement (sequence diagrams): architecture/money-movement-sequence-diagrams.md
      - Transaction flows & ledger examples: architecture/transaction-flows-and-ledger-examples.md
      - Transfer backpressure (client contract): architecture/transfer-backpressure-client-contract.md
      - Outbox & ledger consistency: architecture/outbox-and-ledger-consistency.md
  - Security:
      - System hardening: security/system-hardening.md
      - Onboarding channel hardening: security/onboarding-channel-hardening.md
      - "Rate limits, audit, secrets, mTLS": security/security-operations-advanced.md
  - "Compliance & offline":
      - "Offline packs (print / PDF)": compliance/offline-packs.md
  - Accessibility: accessibility.md
  - Operations:
      - Production deployment: operations/production-deployment.md
      - "Disaster recovery runbook": operations/disaster-recovery-runbook.md
      - "Incident response playbook": operations/incident-response-playbook.md
      - "Schema & migration (production)": operations/schema-migration-guide.md
      - "Capacity planning": operations/capacity-planning.md
      - "Performance tuning": operations/performance-tuning.md
      - "Troubleshooting (flowcharts)": operations/troubleshooting.md
      - "Platform resilience & DLQ": operations/platform-resilience.md
      - "Observability standards": operations/observability-standards.md
      - "Data lifecycle & retention": operations/data-lifecycle.md
      - "CI/CD & deployment patterns": operations/cicd-deployment.md
      - Logging: operations/logging.md
      - Load testing operations: operations/load-testing-operations.md
      - Reconciliation & consistency runbook: operations/reconciliation-and-consistency-runbook.md
  - Reconciliation:
      - Financial operations: reconciliation/financial-operations-and-reconciliation.md
      - Reconciliation job: reconciliation/reconciliation.md
  - Integrations:
      - AML integration (overview): integrations/aml-integration.md
      - FlowGuard wallet / AML plan: integrations/flowguard-wallet-aml.md
      - AML bridge — tenant resolution: integrations/aml-bridge-tenant-resolution.md
  - Load testing:
      - Stakeholder summary: load-testing/stakeholder-load-test-summary.md
      - Reference runs: load-testing/load-test-reference-runs.md
  - Reference:
      - API reference: reference/api.md
      - "API changelog & deprecations": reference/api-changelog.md
      - "API clients & collections": reference/api-client-and-collections.md
      - "OpenAPI in docs (advanced)": reference/openapi-in-docs.md
      - gRPC services: reference/grpc-services.md
      - Configuration reference: reference/configuration-reference.md
      - Service reference:
          - Index: reference/service-reference/README.md
          - Customer Gateway: reference/service-reference/Masarat.Gateway.Customer.Api.reference.md
          - Gateway Management Web: reference/service-reference/Masarat.Gateway.Management.Web.reference.md
          - KYC API: reference/service-reference/Masarat.Kyc.Api.reference.md
          - Ledger API: reference/service-reference/Masarat.Ledger.Api.reference.md
          - LoadTest job: reference/service-reference/Masarat.LoadTest.Job.reference.md
          - Reconciliation job: reference/service-reference/Masarat.Reconciliation.Job.reference.md
          - Reconciliation reporting: reference/service-reference/Masarat.Reconciliation.Reporting.reference.md
          - Transactions API: reference/service-reference/Masarat.Transactions.Api.reference.md
          - Users API: reference/service-reference/Masarat.Users.Api.reference.md
          - Wallets API: reference/service-reference/Masarat.Wallets.Api.reference.md
          - Webhooks API: reference/service-reference/Masarat.Webhooks.Api.reference.md
  - "Doc roadmap & media":
      - "Documentation roadmap": meta/documentation-roadmap.md
      - "Media & diagrams": meta/media-and-diagrams.md

theme:
  name: material
  custom_dir: overrides
  logo: assets/masarat-logo.png
  favicon: assets/favicon.png
  language: en
  font:
    text: Inter
    code: Fira Code
  palette:
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: green
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tracking
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.action.edit
    - announce.dismiss
    - content.tooltips
    - toc.follow

markdown_extensions:
  - attr_list
  - tables
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details
  - pymdownx.betterem
  - pymdownx.smartsymbols
  - pymdownx.magiclink
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

extra:
  doc_version_label: "main"
  doc_feedback_repo: anstwechy/mitf_wallet_public_docs
  masarat_logo_dark: assets/masarat-logo-dark.png
  generator: false
  site_description: |
    Technical reference for the MITF wallet platform — architecture, APIs, operations, security, and integrations.
  social:
    - icon: fontawesome/solid/globe
      link: https://masarat.ly/
    - icon: fontawesome/brands/github
      link: https://github.com/anstwechy/mitf_wallet_public_docs

extra_css:
  - stylesheets/extra.css

strict: false

plugins:
  # search first — recommended when using multiple plugins
  - search
  # Last-updated line on each page (Material source-file partial). Plugin `strict: false`
  # keeps "no git history yet" as INFO so CI `mkdocs build --strict` still passes.
  - git-revision-date-localized:
      strict: false
      enable_creation_date: false
      fallback_to_build_date: true
      enable_git_follow: false
      type: date
      locale: en
  - rss:
      length: 30
      use_git: true
      use_material_blog: false
      use_material_social_cards: false
      feed_title: MITF Wallet documentation updates
      feed_description: >-
        Recent changes to MITF wallet technical documentation for integrators, operators, and auditors.
